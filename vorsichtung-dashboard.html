<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorsichtung Live Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  background: #0d0f14;
  color: #e8ecf4;
  min-height: 100vh;
  padding: 12px;
}

header {
  background: #141720;
  border-bottom: 3px solid #c0392b;
  border-radius: 8px;
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

header h1 { font-size: clamp(14px,3vw,20px); letter-spacing: 3px; text-transform: uppercase; }
header p  { font-size: 9px; letter-spacing: 2px; color: #4a5268; text-transform: uppercase; }

#status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  color: #4a5268;
}
#status.online  { color: #2ec4b6; }
#status.offline { color: #e63946; }

.gesamt-card {
  background: #1a1f2e;
  border: 1.5px solid #2a3048;
  border-radius: 8px;
  padding: 14px 16px;
  text-align: center;
  margin-bottom: 10px;
}

.gesamt-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #4895ef;
  border-bottom: 1px solid #2a3048; padding-bottom: 6px; margin-bottom: 8px;
}

.gesamt-num {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(28px,7vw,48px);
  font-weight: 700;
  color: #f4d35e;
}

.farb-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.farb-card {
  background: #1a1f2e;
  border-radius: 10px;
  padding: 16px 12px;
  text-align: center;
}

.farb-card.rot    { border: 2.5px solid #c0392b; background: rgba(192,57,43,0.1); }
.farb-card.gelb   { border: 2.5px solid #c47d00; background: rgba(196,125,0,0.1); }
.farb-card.gruen  { border: 2.5px solid #1a7a52; background: rgba(26,122,82,0.1); }
.farb-card.schwarz{ border: 2.5px solid #555;    background: rgba(80,80,80,0.1); }

.farb-name {
  font-size: clamp(16px,4vw,22px);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.farb-card.rot    .farb-name { color: #e74c3c; }
.farb-card.gelb   .farb-name { color: #f39c12; }
.farb-card.gruen  .farb-name { color: #2ecc71; }
.farb-card.schwarz .farb-name{ color: #bbb; }

.farb-zahl {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(32px,9vw,52px);
  font-weight: 700;
  line-height: 1;
}
.farb-card.rot    .farb-zahl { color: #e74c3c; }
.farb-card.gelb   .farb-zahl { color: #f39c12; }
.farb-card.gruen  .farb-zahl { color: #2ecc71; }
.farb-card.schwarz .farb-zahl{ color: #bbb; }

.farb-sk {
  font-size: 10px; letter-spacing: 1px; opacity: 0.5; margin-top: 4px;
}

.abschnitte-card {
  background: #1a1f2e;
  border: 1.5px solid #2a3048;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 10px;
  display: none;
}

.abschnitte-title {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: #4895ef; border-bottom: 1px solid #2a3048;
  padding-bottom: 6px; margin-bottom: 10px;
}

.abschnitt-row {
  display: grid;
  grid-template-columns: 1fr auto auto auto auto;
  gap: 8px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: clamp(12px,2.5vw,15px);
}
.abschnitt-row:last-child { border-bottom: none; }

.abschnitt-name { font-weight: 700; }
.ab-rot    { color: #e74c3c; font-family: 'Share Tech Mono', monospace; font-weight: 700; font-size: clamp(18px,4vw,28px); }
.ab-gelb   { color: #f39c12; font-family: 'Share Tech Mono', monospace; font-weight: 700; font-size: clamp(18px,4vw,28px); }
.ab-gruen  { color: #2ecc71; font-family: 'Share Tech Mono', monospace; font-weight: 700; font-size: clamp(18px,4vw,28px); }
.ab-schwarz{ color: #bbb;    font-family: 'Share Tech Mono', monospace; font-weight: 700; font-size: clamp(18px,4vw,28px); }

#no-data { text-align:center; padding:40px; color:#4a5268; font-size:14px; letter-spacing:2px; }
#main { display: none; }

footer {
  text-align: center; color: #2a3048; font-size: 10px;
  letter-spacing: 2px; margin-top: 14px;
  font-family: 'Share Tech Mono', monospace;
}
</style>
</head>
<body>

<script>
const FIREBASE_URL = "https://vorsichtung-default-rtdb.europe-west1.firebasedatabase.app"
</script>

<header>
  <div>
    <p>Berufsrettung Wien · MA 70</p>
    <h1>Vorsichtung Live</h1>
  </div>
  <div id="status">● Verbinde…</div>
</header>

<div id="filter-bar" style="display:none;margin-bottom:10px">
  <div style="font-size:10px;letter-spacing:2px;color:#4a5268;text-transform:uppercase;margin-bottom:6px">Ansicht:</div>
  <div id="filter-buttons" style="display:flex;flex-wrap:wrap;gap:6px"></div>
</div>

<div id="no-data">Warte auf Vorsichtungs-Daten…</div>

<div id="main">

  <div class="gesamt-card">
    <div class="gesamt-label">Gesamt gesichtet</div>
    <div class="gesamt-num" id="d-gesamt">0</div>
  </div>

  <div class="farb-grid">
    <div class="farb-card rot">
      <div class="farb-name">Rot</div>
      <div class="farb-zahl" id="d-rot">0</div>
      <div class="farb-sk">SK I · Sofort</div>
    </div>
    <div class="farb-card gelb">
      <div class="farb-name">Gelb</div>
      <div class="farb-zahl" id="d-gelb">0</div>
      <div class="farb-sk">SK II · Dringend</div>
    </div>
    <div class="farb-card gruen">
      <div class="farb-name">Grün</div>
      <div class="farb-zahl" id="d-gruen">0</div>
      <div class="farb-sk">SK III · Leicht</div>
    </div>
    <div class="farb-card schwarz">
      <div class="farb-name">Schwarz</div>
      <div class="farb-zahl" id="d-schwarz">0</div>
      <div class="farb-sk">SK IV · Verstorben</div>
    </div>
  </div>

  <div class="abschnitte-card" id="abschnitte-card">
    <div class="abschnitte-title">⚕ Abschnitte / Standorte</div>
    <div id="abschnitte-list"></div>
  </div>

</div>

<footer>LETZTE AKTUALISIERUNG: <span id="lastUpdate">–</span></footer>

<script>
const statusEl = document.getElementById("status")
let aktiverFilter = null // null = alle
let alleEinsaetze = {}

function setFilter(key){
  aktiverFilter = (aktiverFilter === key) ? null : key
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.style.borderColor = b.dataset.key === aktiverFilter ? "#4895ef" : "#2a3048"
    b.style.color       = b.dataset.key === aktiverFilter ? "#4895ef" : "#4a5268"
  })
  renderDashboard(alleEinsaetze)
}

function renderDashboard(data){
  alleEinsaetze = data
  const einsaetze = Object.entries(data)
    .map(([k,v]) => ({key:k, ...v}))
    .filter(e => e.abschnitt && e.abschnitt !== "-" && (e.rot||0)+(e.gelb||0)+(e.gruen||0)+(e.schwarz||0) > 0)

  // Filter-Buttons
  const filterBar = document.getElementById("filter-bar")
  const filterBtns = document.getElementById("filter-buttons")
  if(einsaetze.length > 1){
    filterBar.style.display = "block"
    filterBtns.innerHTML = [
      {key:null, label:"Alle"},
      ...einsaetze.map(e => ({key:e.key, label:e.abschnitt}))
    ].map(f => `
      <button class="filter-btn" data-key="${f.key}"
        onclick="setFilter('${f.key}')"
        style="padding:6px 12px;background:#1a1f2e;border:1.5px solid ${aktiverFilter===f.key?'#4895ef':'#2a3048'};
               border-radius:20px;color:${aktiverFilter===f.key?'#4895ef':'#4a5268'};
               font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;
               letter-spacing:1px;text-transform:uppercase;cursor:pointer;">
        ${f.label}
      </button>
    `).join("")
  } else {
    filterBar.style.display = "none"
  }

  // Gefilterte Daten
  const gefiltert = aktiverFilter
    ? einsaetze.filter(e => e.key === aktiverFilter)
    : einsaetze

  let rot=0,gelb=0,gruen=0,schwarz=0
  gefiltert.forEach(e => {
    rot     += e.rot     || 0
    gelb    += e.gelb    || 0
    gruen   += e.gruen   || 0
    schwarz += e.schwarz || 0
  })

  document.getElementById("no-data").style.display = "none"
  document.getElementById("main").style.display = "block"
  document.getElementById("d-gesamt").textContent = rot+gelb+gruen+schwarz
  document.getElementById("d-rot").textContent    = rot
  document.getElementById("d-gelb").textContent   = gelb
  document.getElementById("d-gruen").textContent  = gruen
  document.getElementById("d-schwarz").textContent= schwarz

  const card = document.getElementById("abschnitte-card")
  const list = document.getElementById("abschnitte-list")
  if(gefiltert.length > 1){
    card.style.display = "block"
    list.innerHTML = gefiltert.sort((a,b)=>(b.rot||0)-(a.rot||0)).map(ab => `
      <div class="abschnitt-row">
        <span class="abschnitt-name">${ab.abschnitt}</span>
        <span class="ab-rot">${ab.rot||0}</span>
        <span class="ab-gelb">${ab.gelb||0}</span>
        <span class="ab-gruen">${ab.gruen||0}</span>
        <span class="ab-schwarz">${ab.schwarz||0}</span>
      </div>`).join("")
  } else {
    card.style.display = "none"
  }

  const ts = gefiltert.reduce((a,b)=>a.ts>b.ts?a:b,{ts:""}).ts
  if(ts) document.getElementById("lastUpdate").textContent = new Date(ts).toLocaleTimeString("de-AT")
}

async function fetchData(){
  if(!FIREBASE_URL){ statusEl.textContent = "⚠ Keine Firebase URL"; statusEl.className = "offline"; return }

  try {
    const res = await fetch(FIREBASE_URL + "/triage.json?t=" + Date.now())
    if(!res.ok) throw new Error(res.status)
    const data = await res.json()

    if(!data){ statusEl.textContent = "● Warte…"; statusEl.className = "offline"; return }

    // Summiere alle Abschnitte
    let rot = 0, gelb = 0, gruen = 0, schwarz = 0
    const abschnitte = []

    Object.values(data).forEach(ab => {
      rot     += ab.rot     || 0
      gelb    += ab.gelb    || 0
      gruen   += ab.gruen   || 0
      schwarz += ab.schwarz || 0
      abschnitte.push(ab)
    })

    // Zeige main
    document.getElementById("no-data").style.display = "none"
    document.getElementById("main").style.display = "block"

    document.getElementById("d-gesamt").textContent = rot + gelb + gruen + schwarz
    document.getElementById("d-rot").textContent    = rot
    document.getElementById("d-gelb").textContent   = gelb
    document.getElementById("d-gruen").textContent  = gruen
    document.getElementById("d-schwarz").textContent= schwarz

    // Abschnitte
    const card = document.getElementById("abschnitte-card")
    const list = document.getElementById("abschnitte-list")

    if(abschnitte.length > 1){
      card.style.display = "block"
      list.innerHTML = abschnitte
        .sort((a,b) => (b.rot||0) - (a.rot||0))
        .map(ab => `
          <div class="abschnitt-row">
            <span class="abschnitt-name">${ab.abschnitt || "–"}</span>
            <span class="ab-rot">${ab.rot||0}</span>
            <span class="ab-gelb">${ab.gelb||0}</span>
            <span class="ab-gruen">${ab.gruen||0}</span>
            <span class="ab-schwarz">${ab.schwarz||0}</span>
          </div>
        `).join("")
    } else {
      card.style.display = "none"
    }

    // Zeitstempel
    const ts = abschnitte.reduce((a,b) => a.ts > b.ts ? a : b, {ts:""}).ts
    if(ts) document.getElementById("lastUpdate").textContent = new Date(ts).toLocaleTimeString("de-AT")

    statusEl.textContent = "● LIVE"
    statusEl.className = "online"

  } catch(e) {
    statusEl.textContent = "● Keine Verbindung"
    statusEl.className = "offline"
  }
}

fetchData()
setInterval(fetchData, 5000)
</script>
</body>
</html>
